name: iOS Unsigned IPA Release

on:
  release:
    types:
      - published
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish. If omitted, the current ref is used."
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ios-unsigned-ipa-${{ github.event_name == 'release' && github.event.release.tag_name || github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    env:
      IOS_GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
      IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
      BUNDLE_ID: com.studyapp.ios

    steps:
      - name: Resolve release target and ref
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            RELEASE_NAME="${{ github.event.release.tag_name }}"
            CHECKOUT_REF="${{ github.event.release.tag_name }}"
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_NAME="${{ inputs.tag }}"
            CHECKOUT_REF="${{ inputs.tag || github.ref }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RELEASE_NAME="${{ github.ref_name }}"
            CHECKOUT_REF="${{ github.ref }}"
          fi

          if [ -z "$RELEASE_NAME" ]; then
            echo "Unable to resolve a release name for this run."
            exit 1
          fi

          echo "release_name=$RELEASE_NAME" >> "$GITHUB_ENV"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_ENV"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.checkout_ref }}
          fetch-depth: 0

      - name: Resolve release versions
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$release_name" == v* ]]; then
            MARKETING_VERSION="${release_name#v}"
          else
            MARKETING_VERSION="$release_name"
          fi

          if [[ ! "$MARKETING_VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Release must resolve to a numeric marketing version, got: $MARKETING_VERSION"
            exit 1
          fi

          BUILD_VERSION="${GITHUB_RUN_NUMBER}"

          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_ENV"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_ENV"

      - name: Verify tag exists
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          if ! git rev-parse "refs/tags/$release_name" >/dev/null 2>&1; then
            echo "Git tag was not found in the checked out repository: $release_name"
            exit 1
          fi

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore Firebase iOS config
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_PATH="ios/StudyApp/Resources/GoogleService-Info.plist"
          export CONFIG_PATH
          mkdir -p "$(dirname "$CONFIG_PATH")"

          if [ -n "${IOS_GOOGLE_SERVICE_INFO_PLIST_B64:-}" ]; then
            python3 -c "import base64, os, pathlib; pathlib.Path(os.environ['CONFIG_PATH']).write_bytes(base64.b64decode(os.environ['IOS_GOOGLE_SERVICE_INFO_PLIST_B64']))"
          elif [ -n "${IOS_GOOGLE_SERVICE_INFO_PLIST:-}" ]; then
            printf '%s' "$IOS_GOOGLE_SERVICE_INFO_PLIST" > "$CONFIG_PATH"
          else
            python3 -c "import os, pathlib; bundle_id = os.environ['BUNDLE_ID']; pathlib.Path(os.environ['CONFIG_PATH']).write_text(f'''<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"https://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\">\n<dict>\n  <key>API_KEY</key>\n  <string>unsigned-build-placeholder</string>\n  <key>GCM_SENDER_ID</key>\n  <string>000000000000</string>\n  <key>PLIST_VERSION</key>\n  <string>1</string>\n  <key>BUNDLE_ID</key>\n  <string>{bundle_id}</string>\n  <key>PROJECT_ID</key>\n  <string>unsigned-build-placeholder</string>\n  <key>STORAGE_BUCKET</key>\n  <string>unsigned-build-placeholder.appspot.com</string>\n  <key>IS_ADS_ENABLED</key>\n  <false/>\n  <key>IS_ANALYTICS_ENABLED</key>\n  <false/>\n  <key>IS_APPINVITE_ENABLED</key>\n  <false/>\n  <key>IS_GCM_ENABLED</key>\n  <false/>\n  <key>IS_SIGNIN_ENABLED</key>\n  <false/>\n  <key>GOOGLE_APP_ID</key>\n  <string>1:000000000000:ios:unsignedbuildplaceholder</string>\n</dict>\n</plist>\n''', encoding='utf-8')"
            echo "Firebase config secret was not provided. Created a placeholder plist for unsigned build packaging."
          fi

          if [ ! -s "$CONFIG_PATH" ]; then
            echo "Firebase config file was created but is empty: $CONFIG_PATH"
            exit 1
          fi

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -resolvePackageDependencies \
            -project ios/StudyApp.xcodeproj \
            -scheme StudyApp

      - name: Archive unsigned app bundles
        shell: bash
        run: |
          set -euo pipefail

          ASSET_DIR="$GITHUB_WORKSPACE/release-assets"
          mkdir -p "$ASSET_DIR"

          build_variant() {
            local variant_key="$1"
            local live_activity_mode="$2"
            local archive_path="$RUNNER_TEMP/StudyApp-${variant_key}.xcarchive"
            local package_root="$RUNNER_TEMP/package-${variant_key}"
            local payload_path="$package_root/Payload"
            local asset_label
            if [ "$live_activity_mode" = "on" ]; then
              asset_label="with-live-activity"
            else
              asset_label="without-live-activity"
            fi
            local ipa_name="StudyApp-${release_name}-${asset_label}-unsigned.ipa"
            local ipa_path="$ASSET_DIR/$ipa_name"

            rm -rf "$archive_path" "$package_root" "$ipa_path"

            local -a build_args=(
              -project ios/StudyApp.xcodeproj
              -scheme StudyApp
              -configuration Release
              -sdk iphoneos
              -destination generic/platform=iOS
              -archivePath "$archive_path"
              CODE_SIGNING_ALLOWED=NO
              CODE_SIGNING_REQUIRED=NO
              CODE_SIGN_IDENTITY=
              DEVELOPMENT_TEAM=
              MARKETING_VERSION="$marketing_version"
              CURRENT_PROJECT_VERSION="$build_version"
              SKIP_INSTALL=NO
            )

            if [ "$live_activity_mode" = "off" ]; then
              build_args+=(
                SWIFT_ACTIVE_COMPILATION_CONDITIONS='$(inherited) LIVE_ACTIVITY_DISABLED'
                INFOPLIST_KEY_NSSupportsLiveActivities=NO
              )
            fi

            xcodebuild "${build_args[@]}" clean archive

            local app_path="$archive_path/Products/Applications/StudyApp.app"
            if [ ! -d "$app_path" ]; then
              echo "Expected app bundle was not found at: $app_path"
              exit 1
            fi

            local app_info_plist="$app_path/Info.plist"
            local actual_marketing_version
            local actual_build_version
            local actual_live_activity_value
            local plugins_path="$app_path/PlugIns"
            actual_marketing_version=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$app_info_plist")
            actual_build_version=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$app_info_plist")
            actual_live_activity_value=$(/usr/libexec/PlistBuddy -c "Print :NSSupportsLiveActivities" "$app_info_plist" 2>/dev/null || true)

            if [ "$actual_marketing_version" != "$marketing_version" ]; then
              echo "Warning: built app marketing version mismatch: expected $marketing_version got $actual_marketing_version"
            fi

            if [ "$actual_build_version" != "$build_version" ]; then
              echo "Warning: built app build version mismatch: expected $build_version got $actual_build_version"
            fi

            normalized_live_activity_value="$(printf '%s' "$actual_live_activity_value" | tr '[:upper:]' '[:lower:]')"

            if [ "$live_activity_mode" = "on" ] && [ "$normalized_live_activity_value" != "true" ] && [ "$normalized_live_activity_value" != "yes" ] && [ "$normalized_live_activity_value" != "1" ]; then
              echo "Live Activity enabled build is missing NSSupportsLiveActivities=true"
              exit 1
            fi

            if [ "$live_activity_mode" = "off" ] && [ "$normalized_live_activity_value" = "true" -o "$normalized_live_activity_value" = "yes" -o "$normalized_live_activity_value" = "1" ]; then
              echo "Live Activity disabled build still reports NSSupportsLiveActivities=true"
              exit 1
            fi

            if [ -d "$plugins_path" ]; then
              rm -rf "$plugins_path"
            fi

            if [ -d "$plugins_path" ]; then
              echo "Embedded app extensions are still present at: $plugins_path"
              exit 1
            fi

            mkdir -p "$payload_path"
            cp -R "$app_path" "$payload_path/StudyApp.app"

            (
              cd "$package_root"
              /usr/bin/zip -qry "$ipa_path" Payload
            )

            if [ ! -f "$ipa_path" ]; then
              echo "Unsigned IPA was not created at: $ipa_path"
              exit 1
            fi

            echo "Archived ${variant_key} as $actual_marketing_version ($actual_build_version)"
          }

          build_variant "live-activity-off" "off"

          {
            echo "asset_dir=$ASSET_DIR"
          } >> "$GITHUB_ENV"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipas
          path: ${{ env.asset_dir }}/*.ipa
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            gh release upload "$release_name" "${asset_dir}"/*.ipa --clobber
          elif gh release view "$release_name" >/dev/null 2>&1; then
            gh release upload "$release_name" "${asset_dir}"/*.ipa --clobber
          else
            gh release create "$release_name" "${asset_dir}"/*.ipa --generate-notes --title "$release_name"
          fi

      - name: Remove Firebase iOS config from workspace
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f ios/StudyApp/Resources/GoogleService-Info.plist
