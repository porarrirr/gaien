name: iOS Unsigned IPA Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ios-unsigned-ipa-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    env:
      IOS_GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST }}
      IOS_GOOGLE_SERVICE_INFO_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
      BUNDLE_ID: com.studyapp.ios

    steps:
      - name: Resolve tag and ref
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag }}"
            CHECKOUT_REF="${{ inputs.tag }}"
          else
            TAG_NAME="${{ github.ref_name }}"
            CHECKOUT_REF="${{ github.ref }}"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "Unable to resolve a tag for this run."
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_ENV"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_ENV"

      - name: Resolve release versions
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$tag_name" == v* ]]; then
            MARKETING_VERSION="${tag_name#v}"
          else
            MARKETING_VERSION="$tag_name"
          fi

          if [[ ! "$MARKETING_VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Tag must resolve to a numeric marketing version, got: $tag_name"
            exit 1
          fi

          BUILD_VERSION="${GITHUB_RUN_NUMBER}"

          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_ENV"
          echo "build_version=$BUILD_VERSION" >> "$GITHUB_ENV"

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.checkout_ref }}
          fetch-depth: 0

      - name: Verify tag exists
        shell: bash
        run: |
          set -euo pipefail

          if ! git rev-parse "refs/tags/$tag_name" >/dev/null 2>&1; then
            echo "Git tag was not found in the checked out repository: $tag_name"
            exit 1
          fi

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore Firebase iOS config
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_PATH="ios/StudyApp/Resources/GoogleService-Info.plist"
          export CONFIG_PATH
          mkdir -p "$(dirname "$CONFIG_PATH")"

          if [ -n "${IOS_GOOGLE_SERVICE_INFO_PLIST_B64:-}" ]; then
            python3 -c "import base64, os, pathlib; pathlib.Path(os.environ['CONFIG_PATH']).write_bytes(base64.b64decode(os.environ['IOS_GOOGLE_SERVICE_INFO_PLIST_B64']))"
          elif [ -n "${IOS_GOOGLE_SERVICE_INFO_PLIST:-}" ]; then
            printf '%s' "$IOS_GOOGLE_SERVICE_INFO_PLIST" > "$CONFIG_PATH"
          else
            python3 -c "import os, pathlib; bundle_id = os.environ['BUNDLE_ID']; pathlib.Path(os.environ['CONFIG_PATH']).write_text(f'''<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"https://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\">\n<dict>\n  <key>API_KEY</key>\n  <string>unsigned-build-placeholder</string>\n  <key>GCM_SENDER_ID</key>\n  <string>000000000000</string>\n  <key>PLIST_VERSION</key>\n  <string>1</string>\n  <key>BUNDLE_ID</key>\n  <string>{bundle_id}</string>\n  <key>PROJECT_ID</key>\n  <string>unsigned-build-placeholder</string>\n  <key>STORAGE_BUCKET</key>\n  <string>unsigned-build-placeholder.appspot.com</string>\n  <key>IS_ADS_ENABLED</key>\n  <false/>\n  <key>IS_ANALYTICS_ENABLED</key>\n  <false/>\n  <key>IS_APPINVITE_ENABLED</key>\n  <false/>\n  <key>IS_GCM_ENABLED</key>\n  <false/>\n  <key>IS_SIGNIN_ENABLED</key>\n  <false/>\n  <key>GOOGLE_APP_ID</key>\n  <string>1:000000000000:ios:unsignedbuildplaceholder</string>\n</dict>\n</plist>\n''', encoding='utf-8')"
            echo "Firebase config secret was not provided. Created a placeholder plist for unsigned build packaging."
          fi

          if [ ! -s "$CONFIG_PATH" ]; then
            echo "Firebase config file was created but is empty: $CONFIG_PATH"
            exit 1
          fi

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -resolvePackageDependencies \
            -project ios/StudyApp.xcodeproj \
            -scheme StudyApp

      - name: Archive unsigned app bundle
        shell: bash
        run: |
          set -euo pipefail

          ARCHIVE_PATH="$RUNNER_TEMP/StudyApp.xcarchive"

          xcodebuild \
            -project ios/StudyApp.xcodeproj \
            -scheme StudyApp \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            MARKETING_VERSION="$marketing_version" \
            CURRENT_PROJECT_VERSION="$build_version" \
            SKIP_INSTALL=NO \
            clean archive

          APP_PATH="$ARCHIVE_PATH/Products/Applications/StudyApp.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Expected app bundle was not found at: $APP_PATH"
            exit 1
          fi

          APP_INFO_PLIST="$APP_PATH/Info.plist"
          ACTUAL_MARKETING_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP_INFO_PLIST")
          ACTUAL_BUILD_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$APP_INFO_PLIST")

          if [ "$ACTUAL_MARKETING_VERSION" != "$marketing_version" ]; then
            echo "Built app marketing version mismatch: expected $marketing_version got $ACTUAL_MARKETING_VERSION"
            exit 1
          fi

          if [ "$ACTUAL_BUILD_VERSION" != "$build_version" ]; then
            echo "Built app build version mismatch: expected $build_version got $ACTUAL_BUILD_VERSION"
            exit 1
          fi

          echo "Archived StudyApp $ACTUAL_MARKETING_VERSION ($ACTUAL_BUILD_VERSION)"

          PAYLOAD_PATH="$RUNNER_TEMP/Payload"
          IPA_NAME="StudyApp-${tag_name}-unsigned.ipa"
          IPA_PATH="$GITHUB_WORKSPACE/$IPA_NAME"

          rm -rf "$PAYLOAD_PATH"
          mkdir -p "$PAYLOAD_PATH"
          cp -R "$APP_PATH" "$PAYLOAD_PATH/StudyApp.app"

          (
            cd "$RUNNER_TEMP"
            /usr/bin/zip -qry "$IPA_PATH" Payload
          )

          if [ ! -f "$IPA_PATH" ]; then
            echo "Unsigned IPA was not created at: $IPA_PATH"
            exit 1
          fi

          {
            echo "ipa_name=$IPA_NAME"
            echo "ipa_path=$IPA_PATH"
          } >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: ${{ env.ipa_path }}
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$tag_name" >/dev/null 2>&1; then
            gh release upload "$tag_name" "$ipa_path" --clobber
          else
            gh release create "$tag_name" "$ipa_path" --generate-notes --title "$tag_name"
          fi

      - name: Remove Firebase iOS config from workspace
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f ios/StudyApp/Resources/GoogleService-Info.plist
