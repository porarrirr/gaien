name: iOS Build Check

on:
  push:
    branches:
      - "refactor/**"
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: ios-build-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    env:
      BUNDLE_ID: com.studyapp.ios

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Write placeholder Firebase config
        shell: bash
        run: |
          set -euo pipefail

          CONFIG_PATH="ios/StudyApp/Resources/GoogleService-Info.plist"
          export CONFIG_PATH BUNDLE_ID
          mkdir -p "$(dirname "$CONFIG_PATH")"
          python3 -c "import os, pathlib; bundle_id = os.environ['BUNDLE_ID']; pathlib.Path(os.environ['CONFIG_PATH']).write_text(f'''<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\" \"https://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\">\n<dict>\n  <key>API_KEY</key>\n  <string>AIzaSyD000000000000000000000000000000000</string>\n  <key>GCM_SENDER_ID</key>\n  <string>000000000000</string>\n  <key>PLIST_VERSION</key>\n  <string>1</string>\n  <key>BUNDLE_ID</key>\n  <string>{bundle_id}</string>\n  <key>PROJECT_ID</key>\n  <string>unsigned-build-placeholder</string>\n  <key>STORAGE_BUCKET</key>\n  <string>unsigned-build-placeholder.appspot.com</string>\n  <key>IS_ADS_ENABLED</key>\n  <false/>\n  <key>IS_ANALYTICS_ENABLED</key>\n  <false/>\n  <key>IS_APPINVITE_ENABLED</key>\n  <false/>\n  <key>IS_GCM_ENABLED</key>\n  <false/>\n  <key>IS_SIGNIN_ENABLED</key>\n  <false/>\n  <key>GOOGLE_APP_ID</key>\n  <string>1:000000000000:ios:000000000000000000000000</string>\n</dict>\n</plist>\n''', encoding='utf-8')"

      - name: Resolve Swift packages
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -resolvePackageDependencies \
            -project ios/StudyApp.xcodeproj \
            -scheme StudyApp

      - name: Build StudyApp (Debug, no codesign)
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project ios/StudyApp.xcodeproj \
            -scheme StudyApp \
            -configuration Debug \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath .derived-device \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            DEVELOPMENT_TEAM= \
            build | tee build.log | xcpretty || {
              echo "Build failed; last 200 lines of xcodebuild output:"
              tail -n 200 build.log
              exit 1
            }

      - name: Run unit tests (simulator)
        shell: bash
        run: |
          set -uo pipefail
          # Tests run against the iOS Simulator in a dedicated DerivedData
          # directory so the prior iphoneos build above cannot pollute its
          # module cache.
          SIMULATOR_UDID=$(
            xcrun simctl list devices available 2>/dev/null \
              | grep -E '^[[:space:]]+iPhone.*\(' \
              | tail -n 1 \
              | sed -E 's/.*\(([A-F0-9-]{36})\).*/\1/'
          ) || SIMULATOR_UDID=""
          if [ -z "$SIMULATOR_UDID" ]; then
            echo "No available iPhone simulator was found on this runner. Listing for diagnosis:"
            xcrun simctl list devices available || true
            exit 1
          fi
          set -e
          echo "Using simulator UDID: $SIMULATOR_UDID"
          SIMULATOR_DESTINATION="platform=iOS Simulator,id=$SIMULATOR_UDID"

          # Split "build for testing" and "test without building" so the
          # app's module and Firebase SPM modules are produced before the
          # test bundle links against them. Explicit Swift modules are
          # disabled to avoid a well-known Xcode 26 ordering issue where
          # the dependency scanner cannot find FirebaseAuth/FirebaseFirestore
          # during the host-app swift frontend invocation even though the
          # SPM products build successfully earlier in the same invocation.
          xcodebuild \
            -project ios/StudyApp.xcodeproj \
            -scheme StudyApp \
            -configuration Debug \
            -destination "$SIMULATOR_DESTINATION" \
            -derivedDataPath .derived-simulator \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            DEVELOPMENT_TEAM= \
            SWIFT_ENABLE_EXPLICIT_MODULES=NO \
            build-for-testing | tee test.log | xcpretty || {
              echo "build-for-testing failed; last 200 lines of xcodebuild output:"
              tail -n 200 test.log
              exit 1
            }

          xcodebuild \
            -project ios/StudyApp.xcodeproj \
            -scheme StudyApp \
            -configuration Debug \
            -destination "$SIMULATOR_DESTINATION" \
            -derivedDataPath .derived-simulator \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            DEVELOPMENT_TEAM= \
            test-without-building | tee -a test.log | xcpretty --report junit --output test-results.xml || {
              echo "Tests failed; last 200 lines of xcodebuild output:"
              tail -n 200 test.log
              exit 1
            }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: test-results.xml
          if-no-files-found: ignore

      - name: Remove Firebase iOS config from workspace
        if: always()
        shell: bash
        run: rm -f ios/StudyApp/Resources/GoogleService-Info.plist
